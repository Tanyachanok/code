<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Prediction Result</title>
  <link rel="stylesheet" href="/css/next to step.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app">
    <header class="top-bar">
      <img src="/Logo2.png" class="logo">
      
      <button class="menu-btn" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <main class="content">
      <h1 class="title">Prediction Result</h1>

      <div class="model-card">
        <h2 class="text">Model Confidence Interval</h2>

        <div class="risk-container">
          <svg width="220" height="220" viewBox="0 0 200 200">
            <circle class="bg-circle" cx="100" cy="100" r="90" fill="none" stroke-width="14"></circle>
            <circle id="risk-circle" class="progress-bar" cx="100" cy="100" r="90" fill="none" stroke-width="12"
              stroke-dasharray="565" stroke-dashoffset="565"></circle>

            <circle cx="100" cy="100" r="75" fill="#dfe4e9"></circle>
          </svg>
          <div class="inner-text">
            <span id="risk-percent">0</span><span class="percent-symbol">%</span>
          </div>
        </div>
        <section class="card-warning">
          <div class="header-warning">
            <span id= "recommend-text" class="recommend-text">ควรพิจารณาส่งตรวจ CTPA เพื่อยืนยันผล</span>
          </div>
          
        </section>
      </div>

      <section class="card-warning">
        <div class="header-warning">
          <span class="warning-icon">⚠️</span>
          <span id="ai-text" class="recommend-text">การประเมินโดยระบบปัญญาประดิษฐ์ (AI-Assisted Decision Support) เพื่อใช้เป็นข้อมูลประกอบการตัดสินใจทางคลินิก</span>
        </div>
        
      </section>

      <div class="btn-row">
        <button class="btn btn-secondary">Home</button>
        <!-- <button class="btn btn-secondary">Next</button> -->
      </div>

      <div class="back-wrapper">
        <a href="/predict.html" class="back">&lt; Back to Predict</a>
      </div>
    </main>
  </div>
  <script src="/js/next to step.js"></script>
</body>

</html>
